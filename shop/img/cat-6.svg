<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#dce4e8"/>
  <!-- Messenger bag / crossbody silhouette -->
  <!-- Strap -->
  <path d="M120 108 Q90 130 88 160 Q86 180 100 195"
        fill="none" stroke="#506878" stroke-width="14" stroke-linecap="round"/>
  <!-- Bag body -->
  <rect x="100" y="108" width="200" height="140" rx="10" fill="#6a8ea8"/>
  <!-- Flap -->
  <path d="M100 108 L300 108 L300 168 Q200 188 100 168 Z" fill="#5a7e98"/>
  <!-- Flap closure -->
  <rect x="180" y="162" width="40" height="14" rx="5" fill="#c9a84c" stroke="#b89038" stroke-width="1.5"/>
  <circle cx="200" cy="169" r="4" fill="#a07830"/>
  <!-- Front pocket -->
  <rect x="120" y="188" width="160" height="44" rx="6" fill="#5a7e98"/>
  <line x1="120" y1="200" x2="280" y2="200" stroke="#4a6e88" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <text x="200" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#888" letter-spacing="1">Crossbody</text>
</svg>
